services:
  api:
    build:
      context: .
      dockerfile: ./Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - cms_data:/app/data
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8000
      - ConnectionStrings__Sqlite=Data Source=/app/data/cms.db
      - Auth0__Domain=${AUTH0_DOMAIN}
      - Auth0__Audience=${AUTH0_AUDIENCE}
      - GoogleDrive__ClientID=${GOOGLE_DRIVE_CLIENT_ID}
      - GoogleDrive__ClientSecret=${GOOGLE_DRIVE_CLIENT_SECRET}
      - GoogleDrive__RefreshToken=${GOOGLE_DRIVE_REFRESH_TOKEN}
      - GoogleDrive__FolderId=${GOOGLE_DRIVE_FOLDER_ID}
      - GoogleDrive__SyncIntervalMinutes=${GOOGLE_DRIVE_SYNC_INTERVAL:-15}
    restart: unless-stopped

volumes:
  cms_data:
    name: cms_data
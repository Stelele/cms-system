services:
  api:
    image: stelele/cms-backend:latest
    init: true
    ports:
      - "8001:8000"
    volumes:
      - cms_data:/app/data
    env_file:
      - /opt/cms/backend/.env
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8000
      - ConnectionStrings__Sqlite=Data Source=/app/data/cms.db
    restart: unless-stopped

volumes:
  cms_data:
    name: cms_data
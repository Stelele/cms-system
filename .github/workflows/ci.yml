name: Build & Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  frontend-changes:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
            backend:
              - 'backend/**'

  backend-changes:
    runs-on: ubuntu-latest
    needs: frontend-changes
    outputs:
      changed: ${{ steps.filter.outputs.backend }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
            backend:
              - 'backend/**'

  frontend:
    runs-on: ubuntu-latest
    needs: frontend-changes
    # if: needs.frontend-changes.outputs.changed == 'true'
    permissions:
      contents: read
      pages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.GH_PAT }}
          publish_dir: ./frontend/dist
          publish_branch: gh-pages
          external_repository: Stelele/cms-system-frontend-build
          SPA: true

  backend:
    runs-on: ubuntu-latest
    needs: backend-changes
    # if: needs.backend-changes.outputs.changed == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        working-directory: backend
        run: dotnet restore

      - name: Build
        working-directory: backend
        run: dotnet build --configuration Release

      - name: Run tests
        working-directory: backend
        run: dotnet test --configuration Release --no-build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: stelele/cms-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to droplet
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            # Create directory for CMS
            sudo mkdir -p /opt/cms

            # Create docker-compose.yml with environment variables
            sudo cat > /opt/cms/docker-compose.yml << 'EOF'
            services:
              api:
                image: stelele/cms-backend:latest
                ports:
                  - "8000:8000"
                volumes:
                  - cms_data:/app/data
                environment:
                  - ASPNETCORE_ENVIRONMENT=Production
                  - ASPNETCORE_URLS=http://+:8000
                  - ConnectionStrings__Sqlite=Data Source=/app/data/cms.db
                  - Auth0__Domain=${{ secrets.AUTH0_DOMAIN }}
                  - Auth0__Audience=${{ secrets.AUTH0_AUDIENCE }}
                  - GoogleDrive__ClientID=${{ secrets.GOOGLE_DRIVE_CLIENT_ID }}
                  - GoogleDrive__ClientSecret=${{ secrets.GOOGLE_DRIVE_CLIENT_SECRET }}
                  - GoogleDrive__RefreshToken=${{ secrets.GOOGLE_DRIVE_REFRESH_TOKEN }}
                  - GoogleDrive__FolderId=${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
                  - GoogleDrive__SyncIntervalMinutes=${{ secrets.GOOGLE_DRIVE_SYNC_INTERVAL }}
                restart: unless-stopped

            volumes:
              cms_data:
                name: cms_data
            EOF

            # Pull latest image and start container
            cd /opt/cms
            sudo docker compose pull
            sudo docker compose up -d

            # Wait for container to be healthy
            sleep 10

            # Verify container is running
            sudo docker ps | grep cms-backend

            # Clean up docker-compose.yml to remove secrets from disk
            sudo rm -f /opt/cms/docker-compose.yml

            echo "Deployment complete"
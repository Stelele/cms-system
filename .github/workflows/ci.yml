name: Build & Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  frontend-changes:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
            backend:
              - 'backend/**'

  backend-changes:
    runs-on: ubuntu-latest
    needs: frontend-changes
    outputs:
      changed: ${{ steps.filter.outputs.backend }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
            backend:
              - 'backend/**'

  frontend:
    runs-on: ubuntu-latest
    needs: frontend-changes
    if: needs.frontend-changes.outputs.changed == 'true'
    permissions:
      contents: read
      pages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        env:
          VITE_AUTH0_DOMAIN: ${{ secrets.AUTH0_DOMAIN }}
          VITE_AUTH0_CLIENT_ID: ${{ secrets.AUTH0_CLIENT_ID }}
          VITE_AUTH0_AUDIENCE: ${{ secrets.AUTH0_AUDIENCE }}
          VITE_APP_BASE: /cms-system-frontend-build
        run: npm run build

      - name: Copy index.html to 404.html
        working-directory: frontend
        run: cp dist/index.html dist/404.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.GH_PAT }}
          publish_dir: ./frontend/dist
          publish_branch: gh-pages
          external_repository: Stelele/cms-system-frontend-build
          SPA: true

  backend:
    runs-on: ubuntu-latest
    needs: backend-changes
    # if: needs.backend-changes.outputs.changed == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        working-directory: backend
        run: dotnet restore

      - name: Build
        working-directory: backend
        run: dotnet build --configuration Release

      - name: Run tests
        working-directory: backend
        run: dotnet test --configuration Release --no-build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: stelele/cms-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Copy docker-compose.yml to droplet
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          source: backend/docker-compose.yml
          target: /opt/cms/docker-compose.yml
          rm: true

      - name: Deploy to droplet
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            # Create directory if it doesn't exist
            sudo mkdir -p /opt/cms

            # Remove existing docker-compose.yml (file or directory) to ensure clean copy
            sudo rm -rf /opt/cms/docker-compose.yml

            # Stop existing container if running
            sudo docker compose -f /opt/cms/docker-compose.yml down 2>/dev/null || true

            # Ensure volume has correct permissions (app runs as UID 1654)
            sudo docker volume create cms_data 2>/dev/null || true
            sudo docker run --rm -v cms_data:/app/data alpine chown -R 1654:1654 /app/data 2>/dev/null || true

            # Pull latest image
            sudo docker compose pull

            # Start container with inline environment variables
            cd /opt/cms
            AUTH0_DOMAIN=${{ secrets.AUTH0_DOMAIN }} \
            AUTH0_AUDIENCE=${{ secrets.AUTH0_AUDIENCE }} \
            MEDIATR_LICENSE_KEY=${{ secrets.MEDIATR_LICENSE_KEY }} \
            GOOGLE_DRIVE_CLIENT_ID=${{ secrets.GOOGLE_DRIVE_CLIENT_ID }} \
            GOOGLE_DRIVE_CLIENT_SECRET=${{ secrets.GOOGLE_DRIVE_CLIENT_SECRET }} \
            GOOGLE_DRIVE_REFRESH_TOKEN=${{ secrets.GOOGLE_DRIVE_REFRESH_TOKEN }} \
            GOOGLE_DRIVE_FOLDER_ID=${{ secrets.GOOGLE_DRIVE_FOLDER_ID }} \
            GOOGLE_DRIVE_SYNC_INTERVAL=${{ secrets.GOOGLE_DRIVE_SYNC_INTERVAL }} \
            GROQ_API_KEY=${{ secrets.GROQ_API_KEY }} \
            sudo docker compose up -d

            # Wait for container to start
            sleep 10

            # Verify container is running
            sudo docker ps | grep cms-backend

            echo "Deployment complete"